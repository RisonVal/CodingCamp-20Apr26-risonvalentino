<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>

  <main class="dashboard">

    <!-- Greeting -->
    <header class="card greeting-card">
      <time class="time" id="clock" aria-live="polite">00:00:00</time>
      <p class="date" id="dateDisplay"></p>
      <p class="greeting" id="greeting"></p>
    </header>

    <!-- Middle Row: Timer + Tasks -->
    <section class="middle-row" aria-label="Focus timer and tasks">

      <!-- Focus Timer -->
      <article class="card timer-card">
        <h2 class="card-title">Focus Timer</h2>
        <output class="timer-display" id="timerDisplay" aria-live="polite" aria-label="Timer">25:00</output>
        <menu class="timer-controls">
          <li><button class="btn btn-primary" id="startBtn">Start</button></li>
          <li><button class="btn btn-secondary" id="stopBtn">Stop</button></li>
          <li><button class="btn btn-ghost" id="resetBtn">Reset</button></li>
        </menu>
        <fieldset class="timer-settings">
          <legend class="visually-hidden">Pomodoro duration</legend>
          <label for="pomoDuration">Pomodoro (min):</label>
          <audio src="alarm_clock.mp3" id="timerSound"></audio>
          <input type="number" id="pomoDuration" min="1" max="120" value="25" />
          <button class="btn btn-small btn-primary" id="applyDuration">Apply</button>
        </fieldset>
      </article>

      <!-- To-Do List -->
      <article class="card todo-card">
        <h2 class="card-title">Tasks</h2>
        <form class="todo-input-row" id="taskForm" aria-label="Add a task">
          <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off" />
          <button type="submit" class="btn btn-primary">Add</button>
        </form>
        <ul class="task-list" id="taskList" aria-label="Task list"></ul>
      </article>

    </section>

    <!-- Quick Links -->
    <article class="card links-card">
      <h2 class="card-title">Quick Links</h2>
      <form class="links-input-row" id="linkForm" aria-label="Add a quick link">
        <input type="text" id="linkName" placeholder="Link name" autocomplete="off" />
        <input type="text" id="linkUrl" placeholder="google.com" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Add Link</button>
      </form>
      <nav class="links-list" id="linksList" aria-label="Quick links"></nav>
    </article>

  </main>

  <!-- Edit Task Dialog -->
  <dialog class="modal" id="editDialog" aria-labelledby="editDialogTitle">
    <h3 id="editDialogTitle">Edit Task</h3>
    <input type="text" id="editTaskInput" placeholder="Task name" />
    <menu class="modal-actions">
      <li><button class="btn btn-primary" id="saveEditBtn">Save</button></li>
      <li><button class="btn btn-ghost" id="cancelEditBtn">Cancel</button></li>
    </menu>
  </dialog>

  <script src="js/app.js"></script>
</body>
</html>
